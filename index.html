<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>nerdity.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#08070d;
    --bg2:#0c0a16;
    --magenta:#ff2bd6;
    --green:#39ff14;
    --yellow:#fff200;
    --purple:#7b2ff7;
    --cyan:#21f7ff;
    --ink:#f4f0ff;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'VT323', monospace;
    overflow:hidden;
    position:relative;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    image-rendering:pixelable;
  }

  /* ambient corrupted glow blobs */
  .glow{ position:fixed; inset:0; pointer-events:none; z-index:0; }
  .glow::before,.glow::after{
    content:""; position:absolute; border-radius:50%;
    filter:blur(90px); opacity:.22; mix-blend-mode:screen;
    animation:drift 18s ease-in-out infinite alternate;
  }
  .glow::before{ width:46vmax; height:46vmax; left:-8vmax; top:-10vmax;
    background:radial-gradient(circle,var(--magenta),transparent 62%); }
  .glow::after{ width:42vmax; height:42vmax; right:-10vmax; bottom:-12vmax;
    background:radial-gradient(circle,var(--purple),transparent 62%);
    animation-delay:-7s; }
  @keyframes drift{
    from{ transform:translate3d(0,0,0) scale(1); }
    to{ transform:translate3d(4vw,3vh,0) scale(1.12); }
  }

  /* floating pixel-art icon canvases */
  #icons{ position:fixed; inset:0; z-index:1; pointer-events:none; }
  #icons canvas{
    position:absolute;
    image-rendering:pixelated;
    filter:drop-shadow(0 0 10px rgba(255,43,214,.35));
    animation:bob var(--bob,7s) ease-in-out infinite alternate;
  }
  @keyframes bob{
    from{ transform:translateY(0) rotate(var(--rot,0deg)); }
    to{ transform:translateY(var(--bobamt,-14px)) rotate(var(--rot,0deg)); }
  }

  /* main stage */
  .stage{
    position:relative; z-index:3;
    text-align:center;
    padding:6vmin;
    width:min(92vw,860px);
  }

  .eyebrow{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(8px,1.6vw,11px);
    letter-spacing:.28em;
    color:var(--green);
    text-shadow:0 0 8px rgba(57,255,20,.6);
    margin-bottom:clamp(18px,4vh,34px);
    opacity:.9;
  }
  .eyebrow .blink{ animation:blink 1.1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  /* THE WORDMARK */
  .wordmark{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(34px,11.5vw,118px);
    line-height:1;
    display:inline-flex;
    align-items:flex-end;
    justify-content:center;
    flex-wrap:wrap;
    user-select:none;
  }
  .word{ position:relative; display:inline-block; color:var(--ink); }
  .word .ghost{
    position:absolute; left:0; top:0;
    mix-blend-mode:screen;
    pointer-events:none;
    will-change:transform,clip-path;
  }
  .word .g-m{ color:var(--magenta); animation:ab-m 2.6s steps(20) infinite; }
  .word .g-g{ color:var(--green);   animation:ab-g 3.1s steps(20) infinite; }
  .word .g-c{ color:var(--cyan);    animation:ab-c 2.2s steps(20) infinite; }
  @keyframes ab-m{ 0%,100%{transform:translate(-2px,1px);} 50%{transform:translate(-4px,-1px);} }
  @keyframes ab-g{ 0%,100%{transform:translate(1px,-1px);} 50%{transform:translate(3px,2px);} }
  @keyframes ab-c{ 0%,100%{transform:translate(3px,0);} 50%{transform:translate(1px,-2px);} }

  /* the violent glitch burst, toggled by JS */
  .wordmark.glitch .g-m{ transform:translate(-9px,2px); clip-path:inset(18% 0 42% 0); }
  .wordmark.glitch .g-c{ transform:translate(8px,-3px); clip-path:inset(56% 0 8% 0); }
  .wordmark.glitch .g-g{ transform:translate(-5px,-4px); clip-path:inset(38% 0 24% 0); }
  .wordmark.glitch .word{ animation:shake .18s steps(2) 2; }
  @keyframes shake{ 0%{transform:translate(0,0);} 25%{transform:translate(-3px,1px);} 75%{transform:translate(3px,-1px);} }

  /* .io — perfectly stable, grounding the chaos */
  .tld{
    color:var(--ink);
    font-size:.42em;
    margin-left:.18em;
    align-self:flex-end;
    transform:translateY(-.12em);
    text-shadow:0 0 1px rgba(244,240,255,.5);
  }

  .tagline{
    margin-top:clamp(22px,5vh,40px);
    font-size:clamp(17px,3.2vw,26px);
    line-height:1.45;
    color:#c9c2e6;
    max-width:40ch;
    margin-left:auto; margin-right:auto;
  }
  .tagline em{ color:var(--yellow); font-style:normal; }

  /* fake build bar that never finishes — that's the joke */
  .build{ margin-top:clamp(28px,5vh,44px); }
  .build-label{
    font-family:'Press Start 2P', monospace;
    font-size:9px; letter-spacing:.2em; color:#6f6790;
    display:flex; justify-content:space-between; margin-bottom:10px;
  }
  .build-label b{ color:var(--magenta); font-weight:400; }
  .bar{
    height:14px; border:2px solid #2a2540; background:var(--bg2);
    position:relative; overflow:hidden;
  }
  .bar i{
    position:absolute; inset:0; width:87%;
    background:repeating-linear-gradient(90deg,var(--magenta) 0 8px,var(--purple) 8px 16px);
    animation:barflick 1.4s steps(8) infinite;
  }
  @keyframes barflick{ 50%{ width:84%; } }

  /* terminal clock / status line */
  .terminal{
    margin-top:clamp(26px,5vh,42px);
    font-size:clamp(15px,2.6vw,21px);
    color:var(--green);
    letter-spacing:.04em;
  }
  .terminal .sep{ color:#4a456a; }
  .terminal .cursor{ color:var(--green); animation:blink 1s steps(1) infinite; }

  footer{
    position:fixed; left:0; right:0; bottom:clamp(14px,3vh,26px);
    z-index:3; text-align:center;
    font-family:'Press Start 2P', monospace;
    font-size:9px; letter-spacing:.22em; color:#4a456a;
  }

  /* CRT overlays */
  .scanlines{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:repeating-linear-gradient(0deg,
      rgba(0,0,0,.32) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .sweep{
    position:fixed; left:0; right:0; height:30vh; z-index:6;
    pointer-events:none; top:-30vh;
    background:linear-gradient(180deg,transparent,rgba(33,247,255,.06),transparent);
    animation:sweep 6.5s linear infinite;
  }
  @keyframes sweep{ to{ transform:translateY(160vh); } }
  .vignette{
    position:fixed; inset:0; z-index:4; pointer-events:none;
    box-shadow:inset 0 0 24vmax 6vmax rgba(0,0,0,.85);
  }
  .flicker{
    position:fixed; inset:0; z-index:7; pointer-events:none;
    background:rgba(123,47,247,.03);
    animation:flick 7s steps(2) infinite;
  }
  @keyframes flick{ 0%,96%,100%{opacity:0;} 97%,98%{opacity:1;} }

  @media (max-width:560px){
    #icons canvas.behind{ opacity:.25; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; }
    .word .g-m{ transform:translate(-3px,0); }
    .word .g-c{ transform:translate(3px,0); }
    .word .g-g{ transform:translate(0,-2px); }
  }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div id="icons" aria-hidden="true"></div>

  <main class="stage">
    <p class="eyebrow">// SYSTEM STATUS<span class="blink">_</span></p>

    <h1 class="wordmark" id="wordmark">
      <span class="word">
        <span class="ghost g-m" aria-hidden="true">nerdity</span>
        <span class="ghost g-g" aria-hidden="true">nerdity</span>
        <span class="ghost g-c" aria-hidden="true">nerdity</span>
        nerdity
      </span><span class="tld">.io</span>
    </h1>

    <div class="build">
      <div class="build-label"><span>BUILD PROGRESS</span><b id="pct">87%</b></div>
      <div class="bar"><i></i></div>
    </div>

    <p class="terminal">
      <span id="clock">--:--:--</span>
      <span class="sep">//</span>
      <span id="greeting">booting</span>
      <span class="cursor">█</span>
    </p>
  </main>

  <footer>nerdity.io &nbsp;—&nbsp; © 2026 &nbsp;—&nbsp; no eta, no regrets</footer>

  <div class="scanlines" aria-hidden="true"></div>
  <div class="sweep" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="flicker" aria-hidden="true"></div>

<script>
(() => {
  "use strict";

  /* ---------- pixel sprites ---------- */
  const C = {
    M:'#ff2bd6', G:'#39ff14', Y:'#fff200',
    P:'#7b2ff7', U:'#a24bff', W:'#21f7ff', D:'#141225'
  };

  const SPRITES = {
    alien: [
      '..G.....G..',
      '...G...G...',
      '..GGGGGGG..',
      '.GG.GGG.GG.',
      'GGGGGGGGGGG',
      'G.GGGGGGG.G',
      'G.G.....G.G',
      '...GG.GG...'
    ],
    controller: [
      '.............',
      '..UUUUUUUUU..',
      '.UUUUUUUUUUU.',
      'UUU.Y.UUMUUUU',
      'UU.YYY.UMMMUU',
      'UUU.Y.UUMUUUU',
      '.UUUUUUUUUUU.',
      '..UU.....UU..',
      '.............'
    ],
    calc: [
      '.YYYYYYY.',
      '.YYYYYYY.',
      '.YDDDDDY.',
      '.YWWWWWY.',
      '.YDDDDDY.',
      '.YMDMDMY.',
      '.YDDDDDY.',
      '.YMDMDMY.',
      '.YDDDDDY.',
      '.YMDMDMY.',
      '.YDDDDDY.',
      '.YYYYYYY.'
    ],
    books: [
      '............',
      '.MMMMMMMMMM.',
      '.MDDDDDDDDM.',
      '.GGGGGGGGGG.',
      '.GDDDDDDDDG.',
      '.YYYYYYYYYY.',
      '.YDDDDDDDDY.',
      '.UUUUUUUUUU.',
      '............'
    ]
  };

  /* build an {w,h,px:[{r,g,b,a}]} base buffer once */
  function toBuffer(rows){
    const h = rows.length, w = rows[0].length;
    const px = new Array(w*h);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const ch = rows[y][x];
        if(ch === '.' || !C[ch]){ px[y*w+x] = {r:0,g:0,b:0,a:0}; continue; }
        const hex = C[ch];
        px[y*w+x] = {
          r:parseInt(hex.slice(1,3),16),
          g:parseInt(hex.slice(3,5),16),
          b:parseInt(hex.slice(5,7),16),
          a:255
        };
      }
    }
    return {w,h,px};
  }

  function sample(buf,x,y){
    if(x<0||x>=buf.w||y<0||y>=buf.h) return {r:0,g:0,b:0,a:0};
    return buf.px[y*buf.w+x];
  }

  /* render with chromatic aberration + row-slice glitch */
  function renderGlitch(buf, off, ab, sliceRows){
    const {w,h} = buf;
    const img = off.createImageData(w,h);
    const d = img.data;
    for(let y=0;y<h;y++){
      const rowShift = sliceRows[y] || 0;
      for(let x=0;x<w;x++){
        const sx = x + rowShift;
        const rPix = sample(buf, sx+ab, y);
        const gPix = sample(buf, sx,    y);
        const bPix = sample(buf, sx-ab, y);
        const a = Math.max(rPix.a,gPix.a,bPix.a);
        const i = (y*w+x)*4;
        d[i]   = rPix.a ? rPix.r : (gPix.a?gPix.r:bPix.r);
        d[i+1] = gPix.a ? gPix.g : (rPix.a?rPix.g:bPix.g);
        d[i+2] = bPix.a ? bPix.b : (gPix.a?gPix.b:rPix.b);
        d[i+3] = a;
      }
    }
    return img;
  }

  const reduced = matchMedia('(prefers-reduced-motion:reduce)').matches;
  const stage = document.getElementById('icons');

  /* icon placements: scattered around the hero */
  const layout = [
    {key:'alien',      scale:7, left:'9%',  top:'18%', rot:'-8deg',  behind:true,  bob:'8s',  amt:'-18px'},
    {key:'controller', scale:6, left:'78%', top:'14%', rot:'7deg',   behind:true,  bob:'7s',  amt:'-12px'},
    {key:'calc',       scale:6, left:'14%', top:'66%', rot:'6deg',   behind:false, bob:'9s',  amt:'-16px'},
    {key:'books',      scale:6, left:'82%', top:'70%', rot:'-6deg',  behind:false, bob:'6.5s',amt:'-14px'},
    {key:'alien',      scale:5, left:'88%', top:'42%', rot:'10deg',  behind:true,  bob:'10s', amt:'-22px'},
    {key:'calc',       scale:5, left:'5%',  top:'40%', rot:'-10deg', behind:true,  bob:'7.5s',amt:'-20px'}
  ];

  const sprites = layout.map((cfg,idx) => {
    const buf = toBuffer(SPRITES[cfg.key]);
    const cv = document.createElement('canvas');
    cv.width  = buf.w * cfg.scale;
    cv.height = buf.h * cfg.scale;
    cv.className = cfg.behind ? 'behind' : '';
    cv.style.left = cfg.left;
    cv.style.top  = cfg.top;
    cv.style.setProperty('--rot', cfg.rot);
    cv.style.setProperty('--bob', cfg.bob);
    cv.style.setProperty('--bobamt', cfg.amt);
    cv.style.opacity = cfg.behind ? '0.4' : '0.85';
    if(cfg.behind) cv.style.filter = 'drop-shadow(0 0 8px rgba(123,47,247,.4)) blur(.4px)';
    stage.appendChild(cv);

    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const small = document.createElement('canvas');
    small.width = buf.w; small.height = buf.h;
    const sctx = small.getContext('2d');

    return {buf, ctx, sctx, small, scale:cfg.scale, w:cv.width, h:cv.height,
            phase: idx*1.7, glitchUntil:0};
  });

  /* animation loop */
  let last = 0;
  function frame(t){
    if(t-last > 55){          // ~18fps, plenty for pixel art
      last = t;
      const time = t/1000;
      for(const s of sprites){
        let ab = reduced ? 1 : Math.round(1 + Math.sin(time*1.3 + s.phase));
        const sliceRows = {};
        if(!reduced && t < s.glitchUntil){
          ab += 2 + Math.floor(Math.random()*2);
          for(let y=0;y<s.buf.h;y++){
            if(Math.random() < 0.4) sliceRows[y] = (Math.random()<.5?-1:1)*(1+Math.floor(Math.random()*2));
          }
        }
        const img = renderGlitch(s.buf, 0, ab, sliceRows);
        s.sctx.putImageData(img,0,0);
        s.ctx.clearRect(0,0,s.w,s.h);
        s.ctx.drawImage(s.small,0,0,s.w,s.h);
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* random global glitch bursts: hit wordmark + sprites together */
  const wm = document.getElementById('wordmark');
  function burst(){
    if(!reduced){
      wm.classList.add('glitch');
      const dur = 90 + Math.random()*140;
      const until = performance.now() + dur + 200;
      sprites.forEach(s => s.glitchUntil = until);
      setTimeout(() => wm.classList.remove('glitch'), dur);
    }
    setTimeout(burst, 1800 + Math.random()*3600);
  }
  setTimeout(burst, 1400);

  /* live clock + time-of-day greeting (uses viewer's local time) */
  const clockEl = document.getElementById('clock');
  const greetEl = document.getElementById('greeting');
  function pad(n){ return String(n).padStart(2,'0'); }
  function greetingFor(h){
    if(h < 5)  return 'burning the midnight oil';
    if(h < 12) return 'good morning';
    if(h < 17) return 'good afternoon';
    if(h < 22) return 'good evening';
    return 'working late';
  }
  function tick(){
    const d = new Date();
    clockEl.textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    greetEl.textContent = greetingFor(d.getHours());
  }
  tick(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
